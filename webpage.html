<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: #e74d95;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #ee90b4;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background: #e48ee4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Website 🚀</h1>
    <p>Welcome to my page hosted on Render</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Hello 👋</h2>
      <p>This is a simple HTML page you can deploy easily.</p>
      <button onclick="showMessage()">Click Me</button>
    </div>
  </div>

  <footer>
    <p>© 2026 My Website</p>
  </footer>

  <script>
    function showMessage() {
      alert("Button clicked! 🎉");
    }
  </script>

</body>
</html>
